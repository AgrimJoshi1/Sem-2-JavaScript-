<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(`browser version: ${window.navigator.appVersion}`);
        console.log(`user agent: ${window.navigator.userAgent}`);
        console.log(`browser language: ${window.navigator.language || window.navigator.userLanguage}`);
        console.log(`operating system: ${window.navigator.platform}`);
    </script>
    
</body>
</html>
